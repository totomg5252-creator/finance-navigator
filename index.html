<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金融導航員 Financial Navigator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">FN</div>
      <div class="logo-text">
        <div class="logo-en">Financial Navigator</div>
        <div class="logo-zh">金融導航員</div>
      </div>
    </div>
    <div id="module-nav"></div>
    <div class="sidebar-bottom">
      <div class="api-label">Claude API Key</div>
      <div class="api-row">
        <input type="password" id="api-key-input" placeholder="sk-ant-..." />
        <button onclick="saveApiKey()">儲存</button>
      </div>
      <div class="key-status" id="key-status"></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-crumb" id="topbar-crumb">選擇模塊開始學習</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-quick" onclick="setMode('quick')">精華</button>
        <button class="mode-btn" id="mode-deep" onclick="setMode('deep')">深度</button>
      </div>
    </div>

    <div class="home-screen" id="home-screen">
      <div class="home-eyebrow">Financial Navigator · 金融導航員</div>
      <h1 class="home-title">建立真正的<br>投資思維體系</h1>
      <p class="home-desc">十二個模塊，從金融基礎到全球宏觀視野。涵蓋各大投資流派、風險控管、行為心理學。每個主題由 AI 根據你的模式即時生成。</p>
      <div id="modules-overview"></div>
      <div class="home-hint"><span class="hint-arrow">→</span> 點擊任一模塊開始，上方可切換精華／深度模式</div>
    </div>

    <div class="lesson-screen hidden" id="lesson-screen">
      <div class="lesson-eyebrow" id="lesson-eyebrow"></div>
      <h2 class="lesson-title" id="lesson-title"></h2>
      <div class="lesson-meta" id="lesson-meta"></div>
      <div class="lesson-body">
        <div class="loading-state" id="loading-state">
          <div class="spinner"></div>
          <div class="loading-text" id="loading-text">正在生成課程內容...</div>
          <div class="loading-sub">AI 根據你的學習模式客製化內容</div>
        </div>
        <div class="lesson-content" id="lesson-content"></div>
      </div>
      <div class="lesson-footer">
        <div class="lesson-actions">
          <button class="btn btn-secondary" onclick="renderHome()">← 首頁</button>
          <button class="btn btn-secondary" onclick="regenerate()">重新生成</button>
          <button class="btn btn-primary" onclick="nextTopic()">下一主題 →</button>
        </div>
        <div class="topic-dots" id="topic-dots"></div>
      </div>
    </div>
  </main>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
